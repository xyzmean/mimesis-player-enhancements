name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Setup Dependencies
      run: |
        chmod +x scripts/*.sh
        ./scripts/bootstrap-deps.sh

    - name: Build
      run: ./scripts/build.sh Release

    - name: Prepare Release Asset
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p release_build/MimesisPlayerEnhancement
        cp dist/prod/MimesisPlayerEnhancement.dll release_build/MimesisPlayerEnhancement/
        cp README.md release_build/MimesisPlayerEnhancement/
        cd release_build
        zip -r ../MimesisPlayerEnhancement.zip MimesisPlayerEnhancement

    - name: Generate Version
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Format: yy.m.d (e.g. 26.7.3) as requested
        VERSION=$(date +'%-y.%-m.%-d')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        files: MimesisPlayerEnhancement.zip
        generate_release_notes: true
