name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Setup Dependencies
      run: |
        chmod +x scripts/*.sh
        ./scripts/bootstrap-deps.sh

    - name: Build
      run: ./scripts/build.sh Release
