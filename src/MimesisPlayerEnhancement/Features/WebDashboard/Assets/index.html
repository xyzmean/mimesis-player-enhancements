<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d1117">
  <title>Mimesis Player Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="waiting" x-data="dashboard()" x-init="init()">
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="bg-scrim" aria-hidden="true"></div>

  <div class="app">
    <header class="app-header">
      <div class="app-header-inner">
        <div class="app-brand">
          <h1>Mimesis Player Dashboard</h1>
          <p class="app-subtitle" x-text="subtitle"></p>
        </div>
      </div>
    </header>

    <nav class="app-nav" aria-label="Main navigation" x-show="status.inSession" x-cloak>
      <ul>
        <li>
          <a href="#/players" :class="{ active: route === 'players' }">Players</a>
        </li>
        <li x-show="status.isHost">
          <a href="#/leaderboard" :class="{ active: route === 'leaderboard' }">Leaderboard</a>
        </li>
      </ul>
    </nav>

    <main class="app-main">
      <div class="app-content">
        <section id="view" aria-live="polite">

          <!-- Waiting -->
          <div x-show="!status.inSession" class="waiting-panel">
            <div class="waiting-card">
              <div class="spinner" role="progressbar" aria-label="Waiting for game session"></div>
              <h2>No active session</h2>
              <p>Host or join a game in Mimesis first. This dashboard will connect automatically once a session is running.</p>
            </div>
          </div>

          <!-- Players -->
          <div x-show="status.inSession && route === 'players'" x-cloak>
            <h2 class="page-heading">Players</h2>
            <div class="empty-state" x-show="players.length === 0 && !pageError">
              <p>No players connected.</p>
            </div>
            <div class="empty-state" x-show="pageError">
              <p x-text="pageError"></p>
            </div>
            <div class="players-list" x-show="players.length > 0">
              <template x-for="p in players" :key="p.steamId">
                <article class="surface-card">
                  <div class="player-row">
                    <img class="avatar"
                         :src="avatarUrl(p.steamId, status.snapshotVersion)"
                         alt=""
                         loading="lazy"
                         decoding="async"
                         @error="onAvatarError($event)">
                    <div class="player-meta">
                      <strong>
                        <span x-text="p.displayName"></span>
                        <span class="badge host" x-show="p.isHost">Host</span>
                        <span class="badge local" x-show="p.isLocal">You</span>
                        <span class="badge banned" x-show="p.isBanned">Banned</span>
                      </strong>
                      <small class="player-connection">
                        <span x-text="connectionMeta(p)"></span>
                        <template x-if="isValidSteamId(p.steamId)">
                          <span class="player-links">
                            <span x-show="connectionMeta(p)"> · </span>
                            <a class="external-link" :href="steamProfileUrl(p.steamId)" target="_blank" rel="noopener noreferrer">Steam</a>
                            <span> · </span>
                            <a class="external-link" :href="csStatsUrl(p.steamId)" target="_blank" rel="noopener noreferrer">CSStats</a>
                          </span>
                        </template>
                      </small>
                      <small class="player-session-stats" x-show="p.currentSession" x-text="sessionLine(p)"></small>
                    </div>
                    <div class="player-status">
                      <span class="ping-label" x-text="pingLabel(p)"></span>
                      <span class="ping-bars" :class="pingClass(p)" :title="pingLabel(p)" x-show="pingActive(p) > 0">
                        <template x-for="i in 4" :key="i">
                          <span :style="pingBarHeight(i)" :class="{ on: i <= pingActive(p) }"></span>
                        </template>
                      </span>
                      <span class="ping-bars" x-show="pingActive(p) === 0" title="Unknown">—</span>
                      <a class="btn-text btn" x-show="status.isHost" :href="'#/player/' + p.steamId">Stats</a>
                    </div>
                    <div class="player-actions" x-show="canModerate(p)">
                      <button class="btn btn-outlined" @click="moderate(p.steamId, 'kick')">Kick</button>
                      <button class="btn btn-danger" @click="moderate(p.steamId, 'ban')">Ban</button>
                      <button class="btn btn-text" x-show="p.isBanned" @click="moderate(p.steamId, 'unban')">Unban</button>
                    </div>
                  </div>
                </article>
              </template>
            </div>
          </div>

          <!-- Leaderboard -->
          <div x-show="status.inSession && route === 'leaderboard'" x-cloak>
            <template x-if="!status.isHost">
              <div class="empty-state"><p>Leaderboard is only available to the host.</p></div>
            </template>
            <template x-if="status.isHost">
              <div>
                <h2 class="page-heading">Leaderboard</h2>
                <div class="empty-state" x-show="pageError"><p x-text="pageError"></p></div>
                <div class="empty-state" x-show="!pageError && (!leaderboard || !leaderboard.entries || leaderboard.entries.length === 0)">
                  <p>No leaderboard data for this save slot yet.</p>
                </div>
                <template x-if="leaderboard && leaderboard.entries && leaderboard.entries.length > 0">
                  <div>
                    <p class="table-meta" x-text="'Updated ' + (leaderboard.updatedAtUtc || '—')"></p>
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>Player</th>
                            <th>Currency</th>
                            <th>Mimics</th>
                            <th>Items</th>
                            <th>K/D/R</th>
                            <th>Time</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="e in leaderboard.entries" :key="e.steamId">
                            <tr :class="{ connected: connectedSet.has(String(e.steamId)) }">
                              <td><a :href="'#/player/' + e.steamId" x-text="e.displayName"></a></td>
                              <td x-text="e.currencyEarned"></td>
                              <td x-text="e.mimicEncounterCount"></td>
                              <td x-text="e.itemCarryCount"></td>
                              <td x-text="e.kills + '/' + e.deaths + '/' + e.revives"></td>
                              <td x-text="formatDuration(e.totalConnectedSeconds)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <p class="table-caption">Highlighted rows are currently connected.</p>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Player detail -->
          <template x-if="status.inSession && route === 'player' && steamId">
            <div>
            <template x-if="!status.isHost">
              <div class="empty-state"><p>Player statistics are only available to the host.</p></div>
            </template>
            <template x-if="status.isHost">
              <div>
                <div class="loading-panel" x-show="loadingStats">
                  <div class="spinner" role="progressbar" aria-label="Loading statistics"></div>
                </div>
                <div x-show="!loadingStats && pageError" class="empty-state">
                  <p x-text="pageError"></p>
                </div>
                <div x-show="!loadingStats && !pageError && playerStats">
                  <a class="back-link" href="#/leaderboard">&larr; Back to leaderboard</a>
                  <div class="player-detail-header">
                    <img class="avatar"
                         :src="avatarUrl(steamId, status.snapshotVersion)"
                         alt=""
                         @error="onAvatarError($event)">
                    <div>
                      <h2 class="page-heading player-detail-name" x-text="resolveDisplayName(steamId)"></h2>
                      <div class="player-external-links" x-show="isValidSteamId(steamId)">
                        <a class="external-link" :href="steamProfileUrl(steamId)" target="_blank" rel="noopener noreferrer">Steam profile</a>
                        <span> · </span>
                        <a class="external-link" :href="csStatsUrl(steamId)" target="_blank" rel="noopener noreferrer">CSStats</a>
                      </div>
                    </div>
                  </div>
                  <h3 class="section-title">Global</h3>
                  <div class="stat-grid">
                    <template x-for="card in globalStatCards" :key="card[0]">
                      <article class="stat-card">
                        <small x-text="card[0]"></small>
                        <strong x-text="card[1]"></strong>
                      </article>
                    </template>
                  </div>
                  <template x-if="sessionStatCards.length > 0">
                    <div>
                      <h3 class="section-title">Current session</h3>
                      <div class="stat-grid">
                        <template x-for="card in sessionStatCards" :key="card[0]">
                          <article class="stat-card">
                            <small x-text="card[0]"></small>
                            <strong x-text="card[1]"></strong>
                          </article>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            </div>
          </template>

        </section>
      </div>
    </main>
  </div>

  <aside id="toast" role="status" aria-live="polite" :class="{ show: toastVisible }" x-text="toastMessage" x-cloak></aside>

  <script defer src="/js/api.js"></script>
  <script defer src="/js/dashboard.js"></script>
  <script defer src="/js/alpine.min.js"></script>
</body>
</html>
